# Example workflow that uses the Living Docs drift-check action.
# Copy this into your repo as `.github/workflows/living-docs-drift.yml`.

name: Living Docs Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # required for posting comments on PRs

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git diff against base

      - name: Run Living Docs drift check
        uses: mpklu/living-doc/actions/drift-check@main
        with:
          claude-md-path: 'CLAUDE.md'
          knowledge-dir: 'knowledge'
          fail-on-violation: 'true'
          comment-on-pr: 'true'
